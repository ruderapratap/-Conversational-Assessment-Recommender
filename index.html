<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHL Assessment Recommender</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 800px;
    height: 90vh;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: #c8102e;
    color: white;
    padding: 20px 24px;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header span { font-size: 24px; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 75%;
  }

  .message.user { align-self: flex-end; }
  .message.assistant { align-self: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
  }

  /* Markdown styling inside assistant bubble */
  .assistant .bubble h1,
  .assistant .bubble h2,
  .assistant .bubble h3 {
    font-size: 14px;
    font-weight: 700;
    margin: 8px 0 4px 0;
    color: #1a1a1a;
  }

  .assistant .bubble p {
    margin: 4px 0;
  }

  .assistant .bubble ul,
  .assistant .bubble ol {
    padding-left: 18px;
    margin: 4px 0;
  }

  .assistant .bubble li {
    margin: 3px 0;
  }

  .assistant .bubble strong {
    font-weight: 700;
    color: #111;
  }

  .assistant .bubble em {
    font-style: italic;
  }

  .assistant .bubble code {
    background: #e2e8f0;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }

  .user .bubble {
    background: #c8102e;
    color: white;
    border-bottom-right-radius: 4px;
    white-space: pre-wrap;
  }

  .assistant .bubble {
    background: #f0f4f8;
    color: #1a1a1a;
    border-bottom-left-radius: 4px;
  }

  /* Recommendations cards */
  .recommendations {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 100%;
  }

  .rec-title {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 4px;
  }

  .rec-card {
    background: white;
    border: 1px solid #e2e8f0;
    border-left: 4px solid #c8102e;
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .rec-info { flex: 1; }

  .rec-name {
    font-weight: 600;
    font-size: 13px;
    color: #1a1a1a;
  }

  .rec-type {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .rec-link {
    font-size: 12px;
    color: #c8102e;
    text-decoration: none;
    white-space: nowrap;
    font-weight: 600;
    padding: 4px 10px;
    border: 1px solid #c8102e;
    border-radius: 6px;
  }

  .rec-link:hover {
    background: #c8102e;
    color: white;
  }

  .input-area {
    border-top: 1px solid #e2e8f0;
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    resize: none;
    outline: none;
    font-family: inherit;
    max-height: 120px;
    line-height: 1.5;
  }

  textarea:focus { border-color: #c8102e; }

  button {
    background: #c8102e;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  button:hover { background: #a00d25; }
  button:disabled { background: #ccc; cursor: not-allowed; }

  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #f0f4f8;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .dot {
    width: 8px; height: 8px;
    background: #888;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .welcome {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin: auto;
    padding: 40px;
  }

  .welcome h2 { color: #333; margin-bottom: 8px; font-size: 20px; }

  .end-msg {
    text-align: center;
    color: #888;
    font-size: 13px;
    padding: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span>🎯</span> SHL Assessment Recommender
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <h2>Welcome!</h2>
      <p>Tell me about the role you're hiring for — I'll recommend the right SHL assessments.</p>
      <br>
      <p style="font-size:13px; color:#aaa;">e.g. "I'm hiring a mid-level Java developer" or "We need assessments for 500 contact centre agents"</p>
    </div>
  </div>

  <div class="input-area">
    <textarea 
      id="input" 
      placeholder="Describe the role you're hiring for..." 
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  let history = [];

  // marked config — safe rendering
  marked.setOptions({ breaks: true, gfm: true });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function clearWelcome() {
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();
  }

  function addMessage(role, text, recommendations) {
    clearWelcome();
    const messages = document.getElementById('messages');

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant') {
      // Markdown render karo
      bubble.innerHTML = marked.parse(text || '');
    } else {
      // User message plain text
      bubble.textContent = text;
    }

    div.appendChild(bubble);

    // Recommendations cards
    if (recommendations && recommendations.length > 0) {
      const recsDiv = document.createElement('div');
      recsDiv.className = 'recommendations';

      const title = document.createElement('div');
      title.className = 'rec-title';
      title.textContent = `📋 ${recommendations.length} Assessment(s) Recommended`;
      recsDiv.appendChild(title);

      recommendations.forEach((rec, idx) => {
        const card = document.createElement('div');
        card.className = 'rec-card';

        // Test type label map
        const typeLabels = {
          'K': 'Knowledge & Skills',
          'P': 'Personality & Behavior',
          'A': 'Ability & Aptitude',
          'B': 'Biodata & Situational Judgment',
          'S': 'Simulations',
          'C': 'Competencies',
          'D': 'Development & 360',
          'E': 'Assessment Exercises',
        };
        const types = rec.test_type ? rec.test_type.split(',').map(t => typeLabels[t.trim()] || t.trim()).join(', ') : '-';

        card.innerHTML = `
          <div style="font-size:12px; color:#c8102e; font-weight:700; min-width:20px;">${idx + 1}</div>
          <div class="rec-info">
            <div class="rec-name">${rec.name}</div>
            <div class="rec-type">${types}</div>
          </div>
          <a class="rec-link" href="${rec.url}" target="_blank">View →</a>
        `;
        recsDiv.appendChild(card);
      });

      div.appendChild(recsDiv);
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    clearWelcome();
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      addMessage('assistant', data.reply, data.recommendations);
      history.push({ role: 'assistant', content: data.reply });

      if (data.end_of_conversation) {
        const messages = document.getElementById('messages');
        const endDiv = document.createElement('div');
        endDiv.className = 'end-msg';
        endDiv.textContent = '✅ Conversation complete. Refresh to start over.';
        messages.appendChild(endDiv);
        btn.disabled = true;
        return;
      }

    } catch (err) {
      removeTyping();
      addMessage('assistant', 'Something went wrong. Please try again.');
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
